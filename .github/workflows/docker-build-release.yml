name: Build Docker Image and Upload to Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ github.event.repository.name }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 保存镜像为 .tar 并压缩
      - name: Save Docker image as tar.gz
        run: |
          IMAGE_TAG=$(echo "${{ steps.meta.outputs.tags }}" | head -n1)
          docker pull $IMAGE_TAG
          docker save $IMAGE_TAG -o acaena-image.tar
          gzip acaena-image.tar

      # ========= 新增：上传到 Actions Artifacts（页面可下载） =========
      - name: Upload tar.gz as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: acaena-docker-image
          path: acaena-image.tar.gz
          if-no-files-found: error
          retention-days: 90     # 保留90天，按需修改

      # ========= 原有：仅当 Release 触发时上传到 Release =========
      - name: Upload tar.gz to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: acaena-image.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
