name: Build Docker Image

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/acaena-remote-adb-devices
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64

      # 保存镜像为 .tar 并压缩
      - name: Save Docker image as tar.gz
        run: |
          IMAGE_TAG=$(echo "${{ steps.meta.outputs.tags }}" | head -n1)
          docker pull $IMAGE_TAG
          docker save $IMAGE_TAG -o acaena-image.tar
          gzip acaena-image.tar

      # ========= 新增：上传到 Actions Artifacts（页面可下载） =========
      - name: Upload tar.gz as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: acaena-docker-image
          path: acaena-image.tar.gz
          if-no-files-found: error
          retention-days: 90     # 保留90天，按需修改

      # ========= 原有：仅当 Release 触发时上传到 Release =========
      - name: Upload tar.gz to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: acaena-image.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
